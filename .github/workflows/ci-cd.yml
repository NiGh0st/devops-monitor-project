name: CI/CD — DevOps Monitor

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  API_IMAGE: devops-monitor-api
  DASHBOARD_IMAGE: devops-monitor-dashboard

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint + Test  (runs on every push & PR)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 api/ dashboard/ tests/ --max-line-length=120

      - name: Run tests with coverage
        env:
          API_KEY: test-secret-key
        run: pytest tests/ -v --cov=api --cov-fail-under=75 --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & push images to ACR  (main branch only)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build & push API image
        run: |
          docker build -f api/Dockerfile -t ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }} -t ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest

      - name: Build & push Dashboard image
        run: |
          docker build -f dashboard/Dockerfile -t ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} -t ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:latest

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to Azure Container Apps  (main branch only)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Update API Container App
        run: |
          az containerapp update \
            --name devops-monitor-api \
            --resource-group devops-monitor-rg \
            --image ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Update Dashboard Container App
        run: |
          az containerapp update \
            --name devops-monitor-dashboard \
            --resource-group devops-monitor-rg \
            --image ${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

      - name: Show deployed URLs
        run: |
          echo "API URL:"
          az containerapp show --name devops-monitor-api --resource-group devops-monitor-rg --query "properties.configuration.ingress.fqdn" -o tsv
          echo "Dashboard URL:"
          az containerapp show --name devops-monitor-dashboard --resource-group devops-monitor-rg --query "properties.configuration.ingress.fqdn" -o tsv
